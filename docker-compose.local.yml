services:

  # ── Redis — sessions, rate limiting ────────────────────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Postgres — router replay / audit log ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vsr
      POSTGRES_USER: router
      POSTGRES_PASSWORD: router-secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router -d vsr"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Jaeger — distributed tracing ────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    restart: unless-stopped

  # ── Prometheus — metrics collection ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana — metrics visualization ────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: ""
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Semantic Router ─────────────────────────────────────────────────────────
  router:
    image: ghcr.io/vllm-project/semantic-router/vllm-sr:latest
    command: ["/app/config/modal-config.yaml"]
    volumes:
      - ./config:/app/config:ro
      - vllm-sr-models:/app/models
    environment:
      VLLM_SR_CONFIG: /app/config/modal-config.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8080:8080"    # Router REST API (OpenAI-compatible)
      - "50051:50051"  # gRPC ExtProc
      - "9190:9190"    # Prometheus metrics
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s

  # ── Envoy — public HTTP endpoint on 8899 ───────────────────────────────────
  envoy:
    image: envoyproxy/envoy:v1.34-latest
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "warn"]
    volumes:
      - ./envoy-compose.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8899:8899"    # Main public API
      - "19000:19000"  # Envoy admin
    depends_on:
      router:
        condition: service_healthy
    restart: unless-stopped

  # ── Dashboard UI ────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/backend/Dockerfile
    user: root
    entrypoint: []
    command:
      - "/app/dashboard-backend"
      - "-port=8700"
      - "-static=/app/frontend"
      - "-config=/app/config/modal-config.yaml"
      - "-router_api=http://router:8080"
      - "-router_metrics=http://router:9190/metrics"
      - "-envoy=http://envoy:8899"
      - "-jaeger=http://jaeger:16686"
      - "-prometheus=http://prometheus:9090"
      - "-grafana=http://grafana:3000"
      - "-bootstrap-admin-email=admin@local.dev"
      - "-bootstrap-admin-name=Admin"
      - "-bootstrap-admin-password=admin"
    volumes:
      - ./config:/app/config:ro
      - dashboard-data:/app/data
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8700:8700"
    depends_on:
      router:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vllm-sr-models:
  postgres-data:
  prometheus-data:
  grafana-data:
  dashboard-data:
