global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: vllm-semantic-router
    static_configs:
      - targets: ["router:9190"]
    metrics_path: /metrics

  - job_name: envoy
    static_configs:
      - targets: ["envoy:19000"]
    metrics_path: /stats/prometheus
